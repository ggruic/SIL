tool:
  id: sudreg.company.read.rest
  name: Sudreg Company Reader REST Tool
  plugin: sudreg
  application: sudreg
  implements:
    - sudreg.company.read
  invocation:
    protocol: rest
    method: GET
    path: /api/companies/{company_id}
  security:
    credentials: delegated_user
    secrets: reference_only
