tool:
  id: sudreg.company.history.read.rest
  name: Sudreg Company History Reader REST Tool
  plugin: sudreg
  application: sudreg
  implements:
    - sudreg.company.history.read
  invocation:
    protocol: rest
    method: GET
    path: /api/companies/{company_id}/history
  security:
    credentials: delegated_user
    secrets: reference_only
