plugin:
  id: pipeline
  name: STATIS Pipeline Plugin
  version: 0.1.0
  status: draft
  application: pipeline
  owner: STATIS Team
  description: >
    Integrates STATIS Pipeline with the STATIS Intelligence Layer (SIL).
    The plugin contributes the MVP Pipeline capabilities, tools, flows,
    context providers, policies, approvals, personas and agents.

  sil:
    minimum_version: "0.1.0"

  namespace: pipeline

  contributes:
    capabilities:
      directory: capabilities
    tools:
      directory: tools
    flows:
      directory: flows
    context_providers:
      directory: context
    policies:
      directory: policies
    approvals:
      directory: approvals
    personas:
      directory: personas
    agents:
      directory: agents

  mvp_flows:
    - pipeline.job.explain
    - pipeline.job.run_and_summarize
    - pipeline.run.diagnose_failed
    - pipeline.run.compare_last_two

  dependencies: []

  audit:
    include_plugin_identity: true
    include_plugin_version: true
    include_contributed_resource_ids: true
