policy:
  id: pipeline.secrets
  name: Pipeline Secret Protection Policy
  plugin: pipeline
  rules:
    - id: pipeline.secrets.read.deny
      applies_to:
        - pipeline.job.files.read
        - pipeline.run.logs.read
        - pipeline.run.error.read
      decision: allow_with_redaction
      constraints:
        secrets: redact
        secret_files: deny
